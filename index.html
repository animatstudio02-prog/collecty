<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Gem TCG - Collector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay" id="admin-panel">
        <div class="admin-box">
            <h2>Console Admin En Chef</h2>
            <input type="text" id="admin-cmd" placeholder="Entrer commande (ex: addcoins 1000)">
            <button onclick="executeCommand()">Exécuter</button>
            <button onclick="closeAdmin()">Fermer</button>
        </div>
    </div>

    <header>
        <div class="user-profile">
            <div class="avatar">👤</div>
            <div class="info">
                <h2 id="display-username">Joueur_123</h2>
                <p><span id="coin-count">1000</span> 🪙 Coins</p>
            </div>
        </div>
        <h1>GEMME COLLECTOR</h1>
        <button class="pack-btn" onclick="buyPack()">OUVRIR UN PACK (100 🪙)</button>
    </header>

    <main>
        <div class="stats-bar">
            <span>Collection: <b id="card-count">0</b> / 1000</span>
            <span>Rang: <b id="player-rank">Débutant</b></span>
        </div>
        <div id="card-grid" class="grid"></div>
    </main>

    <!-- Zone secrète pour activer l'admin -->
    <div id="secret-trigger" onclick="promptAdmin()"></div>

    <script src="script.js"></script>
</body>
</html>
