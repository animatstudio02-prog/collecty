<!-- À mettre dans la fonction addCardToInventory de ton script.js -->
<div class="card ${rarityClass}">
    <div class="card-inner">
        <div class="card-glow"></div>
        <div class="card-header">
            <span class="card-id">#${id}</span>
            <span class="card-rarity">${rarityName}</span>
        </div>
        <div class="card-image">
            <img src="https://api.dicebear.com{id}" alt="Gem">
        </div>
        <div class="card-info">
            <div class="card-name">Pierre d'Animé</div>
            <div class="card-stats">💎 Valeur: ${power}</div>
        </div>
    </div>
</div>
